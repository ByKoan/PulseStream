services:
  db:
    image: mysql:8.0
    container_name: mysql_music_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: music_db
    ports:
      - "50000:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 3s
      retries: 20
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 1024M

  webserver:
    build: .
    container_name: webserver
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: music_db
    volumes:
      - ./src/music:/app/music
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 1024M

  tests:
    build:
      context: .
      dockerfile: Dockerfile.tests
    container_name: pulsestream_tests
    profiles:
      - tests
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: music_db
      BASE_MUSIC_FOLDER: /app/music
      SECRET_KEY: test_secret_key_pytest
    volumes:
      - ./src/music:/app/music
      - ./src/tests:/app/tests
    command: >
      pytest /app/tests -v --tb=short
      --cov=/app --cov-report=term-missing
      --html=/app/tests/reports/report.html --self-contained-html

volumes:
  mysql_data:
