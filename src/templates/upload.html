<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseStream - Subir Archivos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='upload.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
</head>
<body>

<!-- ================= NAVBAR ================= -->

<div class="navbar">

    <!-- Contenedor izquierdo: menu toggle + dropdown -->
    <div class="menu-container">
        <button class="menu-toggle" onclick="toggleMenu()">Menu</button>

        <div id="dropdownMenu" class="dropdown-menu">

            {% if session['user_id'] and session.get('role') == 'admin' %}
            <button onclick="location.href='{{ url_for('admin.admin_panel') }}'">
                Panel admin
            </button>
            {% endif %}

            <button onclick="location.href='{{ url_for('upload.upload_file') }}'">
                Upload
            </button>

            <button onclick="location.href='/playlists'">
                Playlists
            </button>

            <button onclick="location.href='{{ url_for('youtube.youtube_page') }}'">
                Youtube
            </button>

            <button onclick="location.href='/'" class="active">
                Inicio
            </button>

        </div>
    </div>

    <!-- Botón de cerrar sesión -->
    <button class="logout" onclick="location.href='/logout'">
        Cerrar sesión
    </button>

</div>

<h1>Subir canciones</h1>

<form action="/upload" method="post" enctype="multipart/form-data">
    <div class="file-input-container">
        <label>Selecciona archivos para subir:</label><br>
        <input type="file" name="file" multiple>
        <br>
        <button type="submit">Subir</button>
    </div>
</form>

<script src="{{ url_for('static', filename='upload.js') }}"></script>

</body>
</html>
