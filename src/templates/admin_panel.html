<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        body { font-family: Arial, sans-serif; color: #fff; background: linear-gradient(to right, #1d2671, #c33764); margin:0; padding:20px; }
        h1, h2 { text-align: center; }
        .top-bar { display: flex; justify-content: space-between; margin-bottom: 20px; }
        button { cursor:pointer; padding:8px 15px; border:none; border-radius:5px; margin:2px; }
        button:hover { background-color:#333; }
        table { width:100%; border-collapse:collapse; margin-top:10px; }
        th, td { border:1px solid white; padding:10px; text-align:center; }
        form { display:inline; }
        select, input { padding:5px; margin:2px; border-radius:5px; border:none; }
    </style>
</head>
<body>

<div class="top-bar">
    <a href="{{ url_for('music.index') }}"><button>Volver al reproductor</button></a>
    <a href="{{ url_for('auth.logout') }}"><button>Cerrar sesión</button></a>
</div>

<h1>Panel de Administración</h1>
<h2>Bienvenido, {{ session['user_id'] }} ({{ session['role'] }})</h2>

<!-- Formulario para crear usuario -->
<h2>Crear nuevo usuario</h2>
<form action="{{ url_for('admin.admin_panel') }}" method="post">
    <input type="hidden" name="action" value="create">
    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Contraseña" required>
    <select name="role">
        <option value="user">User</option>
        <option value="admin">Admin</option>
    </select>
    <button type="submit">Crear usuario</button>
</form>

<!-- Lista de usuarios -->
<h2>Usuarios registrados</h2>
<table>
    <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Rol</th>
        <th>Acciones</th>
    </tr>
    {% for user in users %}
    <tr>
        <td>{{ user.id }}</td>
        <td>{{ user.username }}</td>
        <td>
            <form action="{{ url_for('admin.change_role', username=user.username) }}" method="post">
                <select name="role" onchange="this.form.submit()">
                    <option value="user" {% if user.role=='user' %}selected{% endif %}>User</option>
                    <option value="admin" {% if user.role=='admin' %}selected{% endif %}>Admin</option>
                </select>
            </form>
        </td>
        <td>
            <form action="{{ url_for('admin.delete_user', user_id=user.id) }}" method="post" onsubmit="return confirm('¿Eliminar usuario {{ user.username }}?');">
                <button type="submit">Eliminar</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
