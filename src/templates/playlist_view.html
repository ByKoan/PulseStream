<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ playlist.name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='playlist_view.css') }}">
</head>
<body>

<!-- ================= NAVBAR ================= -->

<div class="navbar">

    <!-- Contenedor izquierdo: menu toggle + dropdown -->
    <div class="menu-container">
        <button class="menu-toggle" onclick="toggleMenu()">Menu</button>

        <div id="dropdownMenu" class="dropdown-menu">

            {% if session['user_id'] and session.get('role') == 'admin' %}
            <button onclick="location.href='{{ url_for('admin.admin_panel') }}'">
                Panel admin
            </button>
            {% endif %}

            <button onclick="location.href='{{ url_for('upload.upload_file') }}'">
                Upload
            </button>

            <button onclick="location.href='/playlists'">
                Playlists
            </button>

            <button onclick="location.href='{{ url_for('youtube.youtube_page') }}'">
                Youtube
            </button>

            <button onclick="location.href='/'" class="active">
                Inicio
            </button>

        </div>
    </div>

    <!-- Botón de cerrar sesión -->
    <button class="logout" onclick="location.href='/logout'">
        Cerrar sesión
    </button>

</div>

<h1>Playlist: {{ playlist.name }}</h1>

<h2>Canción actual: <span id="currentSongTitle"></span></h2>

<div class="playback-controls">

    <button class="nav-btn" onclick="handlePreviousClick()">
        Anterior
    </button>

    <audio id="player" controls autoplay>
        <source id="audioSource" src="" type="audio/mpeg">
    </audio>

    <button class="nav-btn" onclick="handleNextClick()">
        Siguiente 
    </button>

</div>

<form id="searchForm" class="search-form">
    <input type="text" id="searchInput" placeholder="Buscar canciones...">
    <button type="submit">Buscar</button>
    <button type="button" id="resetSearch">Reiniciar</button>
</form>

<div class="player-toggles">

    <!-- SHUFFLE -->
    <div id="shuffleToggleContainer" class="toggle-container">
        <div id="shuffleToggle" class="toggle"></div>
        <span>Shuffle</span>
    </div>

    <!-- LOOP -->
    <div id="loopToggleContainer" class="toggle-container">
        <div id="loopToggle" class="toggle"></div>
        <span>Loop</span>
    </div>

</div>

<h2>Canciones</h2>

<ul id="songList">
{% for song in songs %}
    <li class="song-item" data-filename="{{ song }}">
        <span class="song-title">{{ song }}</span>
        <button class="remove-from-playlist"
                data-filename="{{ song }}"
                data-playlist="{{ playlist.id }}">
            Quitar
        </button>
    </li>
{% endfor %}
</ul>

<script>
    window.songs = {{ songs | tojson }};
</script>

<script src="{{ url_for('static', filename='playlist_player.js') }}"></script>

</body>
</html>
